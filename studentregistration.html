<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <center><img src="https://www.sbjit.edu.in/wp-content/uploads/2021/07/sbjitlogof4.png" alt="college logo" width="400px" height="100px" >
        <hr>
   <h2>Student Registration Form</h2></center>
    <center><form> 
    <label for="Name">Name:</label>
    <input type="text" id="Name" name="Name" required>

    <label for="Email">Email:</label>
    <input type="email" id="Email" name="Email" required>
     <br>
    <label for="Phone">Phone:</label>
    <input type="tel" id="Phone" name="Phone" required>

    <label for="Roll Number">Roll Number:</label>
    <input type="text" id="Roll Number" name="Roll Number" required>
    <br>
    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>
    <label for="Branch">Branch:</label>
    <input type="text" id="Branch" name="Branch" required>
    <br>
    <label for="year">Year:</label>
    <input type="number" id="year" name="year" min="1" max="4" required>
    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob" required>
    <br>
    <label for="github">GitHub Profile:</label>
    <input type="url" id="github" name="github" required>
    <label for="linkedin">LinkedIn Profile:</label>
    <input type="url" id="linkedin" name="linkedin" required>
    <br>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
</form></center>
</body>
</html>
